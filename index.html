<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="idrto — something new is on the way.">
  <title>idrto — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="orb orb--one"></div>
    <div class="orb orb--two"></div>
    <div class="orb orb--three"></div>
    <div class="grid"></div>
  </div>

  <main class="page">
    <header class="brand">
      <span class="brand__mark" aria-hidden="true"></span>
      <span class="brand__name">idrto</span>
    </header>

    <section class="hero">
      <p class="hero__eyebrow">Coming soon</p>
      <h1 class="hero__title">We're building<br><em>something worth the wait.</em></h1>
      <p class="hero__lead">
        A new space is taking shape. Check back soon — or leave your email and we'll let you know when we launch.
      </p>

      <form class="notify" action="#" method="post" onsubmit="return false;">
        <label class="visually-hidden" for="email">Email address</label>
        <input
          class="notify__input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
        <button class="notify__btn" type="submit">Notify me</button>
      </form>
      <p class="notify__hint" role="status" hidden>Thanks — we'll be in touch.</p>
    </section>

    <footer class="footer">
      <p class="footer__copy">&copy; <span id="year"></span> idrto</p>
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    document.querySelector('.notify').addEventListener('submit', function (e) {
      e.preventDefault();
      var hint = document.querySelector('.notify__hint');
      hint.hidden = false;
      this.querySelector('.notify__input').value = '';
      this.querySelector('.notify__btn').disabled = true;
    });
  </script>
</body>
</html>
